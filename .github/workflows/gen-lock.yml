name: Generate composer.lock (one-off, issue #19)

on:
  workflow_dispatch: {}

jobs:
  gen-lock:
    name: composer update -> upload lock as artifact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.1
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring, pdo, pdo_mysql, curl, gd, intl, dom, xml, tokenizer, ctype, json
          coverage: none

      - name: Composer update (resolve from composer.json)
        run: composer update --prefer-dist --no-progress

      - name: Upload composer.lock
        uses: actions/upload-artifact@v4
        with:
          name: composer-lock
          path: composer.lock
          retention-days: 7
