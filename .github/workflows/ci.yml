name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: PHPUnit + PHPStan + CS (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.1']

    services:
      # MySQL 8 usa-e-getta per tests/Integration/RateLimiterTest.php.
      # Le tabelle (es. login_attempts) sono create/droppate dal test stesso in setUp().
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: spoome_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
          --health-start-period=10s

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, pdo, pdo_mysql, curl, gd, intl, dom, xml, tokenizer, ctype, json
          coverage: none
        env:
          COMPOSER_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # composer.lock è coerente con composer.json (rigenerato in CI, issue #19):
      # `install` è deterministico e verifica che il lock non sia mai fuori sync
      # (fallisce se qualcuno tocca composer.json senza rigenerare il lock).
      - name: Composer install
        run: composer install --prefer-dist --no-progress

      - name: PHPUnit (bloccante)
        env:
          # Formato ESATTO atteso da tests/Integration/RateLimiterTest.php:
          # new PDO($dsn, $user, $pass) con dsn "mysql:host=...;dbname=...".
          # Il test crea/droppa da solo le tabelle di cui ha bisogno — NON tocca mai il DB
          # di produzione (che è su SiteGround, non su questo runner).
          SPOOME_TEST_DSN: "mysql:host=127.0.0.1;dbname=spoome_test;charset=utf8mb4"
          SPOOME_TEST_USER: root
          SPOOME_TEST_PASS: root
        run: composer test

      - name: "PHPStan (bloccante)"
        run: composer stan

      - name: "PHP-CS-Fixer (bloccante)"
        run: composer cs
